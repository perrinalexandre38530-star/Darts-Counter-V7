<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Multisports Receiver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    :root{
      --bg:#111214;
      --bgGlow1: rgba(212,166,73,.11);
      --bgGlow2: rgba(255,214,120,.06);
      --bgGlow3: rgba(255,255,255,.03);
      --panel:rgba(255,255,255,.035);
      --panelBorder:rgba(244,210,108,.24);
      --text:#f7f3e8;
      --muted:rgba(255,244,214,.68);
      --accent:#f4d26c;
      --accent2:#ffd978;
      --gold:#f4d26c;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(1200px 680px at 50% 0%, var(--bgGlow1) 0%, rgba(212,166,73,0) 64%),
        radial-gradient(900px 460px at 84% 22%, var(--bgGlow2), rgba(255,214,120,0) 58%),
        radial-gradient(900px 460px at 18% 80%, var(--bgGlow3), rgba(255,255,255,0) 58%),
        var(--bg);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:18px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.14);
      pointer-events:none;
      opacity:.6;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 0 60px rgba(244,210,108,.08);
    }

    #wrap{
      min-height:100vh;
      width:100%;
      padding:20px 24px 18px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      margin-bottom:12px;
      min-height:58px;
      flex:0 0 auto;
    }

    .brand-block{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      min-width:0;
      width:100%;
    }

    .pill, #build, #status{ display:none !important; }

    h1{
      margin:0;
      font-size:clamp(2.2rem,4.4vw,4.6rem);
      line-height:.95;
      font-weight:1000;
      letter-spacing:-.04em;
      color:#f6d57a;
      text-shadow:
        0 0 12px rgba(244,210,108,.22),
        0 0 22px rgba(255,214,120,.10),
        0 8px 20px rgba(0,0,0,.22);
      white-space:nowrap;
    }

    #gameBadge{
      font-size:clamp(1.4rem,2.6vw,2.4rem);
      line-height:1;
      font-weight:1000;
      color:var(--gold);
      text-shadow:0 0 14px rgba(244,210,108,.28), 0 0 28px rgba(244,210,108,.10);
      white-space:nowrap;
      margin-left:auto;
    }

    #content{
      flex:1;
      min-height:0;
      overflow:hidden;
    }

    #diag{
      display:none !important;
    }

    .receiver-shell{
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .home-shell{
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .home-center{
      width:min(1100px,100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:16px;
    }

    .home-logo{
      width:min(220px, 24vw);
      max-width:220px;
      height:auto;
      display:block;
      object-fit:contain;
      filter:
        drop-shadow(0 0 16px rgba(255,214,90,.10))
        drop-shadow(0 0 28px rgba(83,231,255,.08));
    }

    .home-logo-fallback{
      display:none;
      font-size:clamp(52px, 6vw, 90px);
      line-height:.95;
      font-weight:1000;
      color:#f6e6b3;
      text-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .home-tagline{
      margin-top:8px;
      font-size:clamp(20px, 2.2vw, 32px);
      font-weight:900;
      line-height:1.16;
      color:#f7f2df;
      text-shadow:0 8px 24px rgba(0,0,0,.28);
    }

    .receiver-layout{
      display:grid;
      grid-template-columns:260px minmax(0,1fr);
      gap:16px;
      height:100%;
      min-height:0;
      align-items:stretch;
    }

    .main-column{
      min-width:0;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:14px;
      overflow:hidden;
    }

    .panel{
      border:1px solid var(--panelBorder);
      border-radius:24px;
      background:
        radial-gradient(circle at 18% 16%, rgba(244,210,108,.08), transparent 28%),
        radial-gradient(circle at 84% 80%, rgba(255,255,255,.03), transparent 26%),
        linear-gradient(180deg, rgba(35,36,40,.96), rgba(22,23,27,.98));
      box-shadow:
        0 18px 42px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.04),
        0 0 18px rgba(244,210,108,.10);
      backdrop-filter: blur(8px);
      overflow:hidden;
    }

    .order-panel{
      padding:14px;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .panel-title{
      font-size:18px;
      font-weight:1000;
      margin-bottom:12px;
      color:#f4d26c;
      text-shadow:0 0 10px rgba(244,210,108,.20);
      flex:0 0 auto;
    }

    .panel-title-tight{margin-bottom:0;font-size:16px;}

    .panel-title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:8px;
    }

    .panel-subtitle{
      font-size:12px;
      opacity:.72;
      font-weight:700;
    }

    .mini-player-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      overflow:hidden;
    }

    .mini-player-card{
      display:grid;
      grid-template-columns:46px minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
      border-radius:18px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
      min-width:0;
    }

    .mini-player-card.is-active{
      border-color:rgba(244,210,108,.45);
      background:linear-gradient(180deg, rgba(244,210,108,.14), rgba(255,255,255,.03));
      box-shadow:
        0 0 18px rgba(244,210,108,.14),
        inset 0 1px 0 rgba(255,255,255,.03);
    }

    .mini-player-name{
      font-size:16px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mini-player-score{
      font-size:24px;
      font-weight:1000;
      line-height:1;
      letter-spacing:-.04em;
      white-space:nowrap;
    }

    .avatar-frame{
      border-radius:999px;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      box-shadow:
        0 10px 24px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 0 4px rgba(255,255,255,.02);
      flex:0 0 auto;
    }

    .avatar-fallback{
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:1000;
      background:
        radial-gradient(circle at 30% 25%, rgba(83,231,255,.22), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(16,24,36,.96), rgba(8,10,18,.96));
    }

    .active-panel{
      padding:18px;
      flex:0 0 auto;
    }

    .active-top{
      display:grid;
      grid-template-columns:220px minmax(0,1fr);
      gap:16px;
      align-items:center;
    }

    .active-left{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-width:0;
    }

    .active-avatar-wrap{
      position:relative;
    }

    .active-badge{
      display:none !important;
    }

    .active-name{
      margin-top:12px;
      font-size:28px;
      font-weight:1000;
      line-height:1.06;
      max-width:100%;
      word-break:break-word;
      color:var(--gold);
      text-shadow:0 0 12px rgba(244,210,108,.26), 0 8px 24px rgba(0,0,0,.24);
    }

    .score-card{
      min-height:164px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 18% 20%, rgba(244,210,108,.12), transparent 30%),
        radial-gradient(circle at 84% 80%, rgba(255,255,255,.05), transparent 30%),
        linear-gradient(180deg, rgba(30,31,36,.98), rgba(18,19,24,.98));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 0 24px rgba(244,210,108,.10);
      padding:16px 18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
    }

    .score-label{
      font-size:18px;
      font-weight:900;
      opacity:.88;
      margin-bottom:10px;
      color:var(--gold);
      text-shadow:0 0 12px rgba(244,210,108,.18);
    }

    .score-value{
      font-size:clamp(96px, 12vw, 180px);
      line-height:.88;
      font-weight:1000;
      letter-spacing:-.06em;
      color:var(--gold);
      text-shadow:
        0 10px 28px rgba(0,0,0,.30),
        0 0 16px rgba(244,210,108,.30),
        0 0 8px rgba(244,210,108,.18);
      white-space:nowrap;
      overflow:hidden;
      max-width:100%;
    }

    .active-bottom{
      margin-top:12px;
      display:grid;
      grid-template-columns:minmax(0, 1.1fr) minmax(360px, .9fr);
      gap:12px;
      align-items:stretch;
    }

    .evolution-side,.stats-side{min-width:0;}

    .stats-grid{
      margin-top:0;
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:10px;
    }

    .compact-stats-grid{
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:8px;
    }

    .stat-cell{
      min-height:58px;
      border-radius:14px;
      border:1px solid rgba(244,210,108,.30);
      background:linear-gradient(180deg, rgba(40,41,46,.94), rgba(28,29,34,.98));
      padding:9px 11px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 0 14px rgba(244,210,108,.08);
      overflow:hidden;
    }

    .stat-label{
      opacity:.88;
      color:#f1d38a;
      font-size:11px;
      margin-bottom:5px;
      font-weight:900;
      white-space:nowrap;
    }

    .stat-value{
      font-size:18px;
      font-weight:1000;
      line-height:1.05;
      color:#fff4d7;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .graph-panel{
      margin-top:0;
      padding:14px;
      flex:1 1 auto;
      min-height:0;
    }

    .evo-box{
      height:100%;
      min-height:0;
      border-radius:18px;
      border:1px solid rgba(244,210,108,.24);
      background:linear-gradient(180deg, rgba(36,37,42,.96), rgba(24,25,30,.98));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 0 16px rgba(244,210,108,.08);
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .evo-title-row{margin-bottom:6px;}

    .evo-empty{
      height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;
      border-radius:18px;border:1px solid rgba(244,210,108,.18);
      background:linear-gradient(180deg, rgba(36,37,42,.96), rgba(24,25,30,.98));
      color:var(--muted);text-align:center;padding:14px;
    }
    .evo-empty-title{font-weight:1000;color:var(--gold);margin-bottom:8px;}
    .evo-empty-sub{font-size:13px;}

    .graph-svg{
      width:100%;
      height:auto;
      display:block;
      border-radius:14px;
      background:radial-gradient(circle at top, rgba(255,255,255,.04), rgba(255,255,255,.01));
    }

    .compact-graph{flex:1 1 auto;min-height:0;}

    .graph-legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px 16px;
      margin-top:10px;
    }

    .compact-legend{gap:8px 12px;margin-top:8px;}

    .graph-legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .graph-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    .graph-legend-name{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:14px;
    }

    .graph-legend-score{
      opacity:.78;
      font-size:14px;
    }
    @media (max-width: 1280px){
      .receiver-layout{grid-template-columns:230px minmax(0,1fr);gap:12px;}
      .active-top{grid-template-columns:190px minmax(0,1fr);}
      .score-value{font-size:clamp(82px, 10vw, 144px);}
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div class="topbar">
      <div class="brand-block">
        <h1>Multisports Scoring</h1>
        <div id="gameBadge"></div>
        <div class="pill">● Receiver Chromecast CAF</div>
        <div id="status">Chargement du receiver…</div>
        <div id="build">Build: CAF-VISUAL-X01-2026-03-19-5</div>
      </div>
    </div>

    <div id="content"></div>
    <div id="diag">Initialisation…</div>
  </div>

  <script src="receiver.js?v=CAF-VISUAL-X01-ANTHRACITE-2026-03-26-1"></script>
</body>
</html>

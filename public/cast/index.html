<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Multisports Receiver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    :root{
      --bg:#161618;
      --bgGlow1: rgba(255,209,84,.08);
      --bgGlow2: rgba(255,123,194,.05);
      --bgGlow3: rgba(83,231,255,.05);
      --panel:rgba(255,255,255,.03);
      --panelBorder:rgba(244,210,108,.44);
      --text:#f7f6f3;
      --muted:rgba(255,255,255,.72);
      --accent:#53e7ff;
      --accent2:#7cc3ff;
      --gold:#f4d26c;
      --shellPad:clamp(12px,1.45vw,22px);
      --goldGlow:0 0 18px rgba(244,210,108,.12);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(1200px 680px at 50% 0%, var(--bgGlow1) 0%, rgba(0,145,255,0) 64%),
        radial-gradient(900px 460px at 84% 22%, var(--bgGlow2), rgba(255,79,216,0) 58%),
        radial-gradient(900px 460px at 18% 80%, var(--bgGlow3), rgba(66,232,255,0) 58%),
        var(--bg);
      overflow:hidden;
      overscroll-behavior:none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:clamp(8px,1vw,16px);
      border-radius:28px;
      border:1px solid rgba(255,255,255,.14);
      pointer-events:none;
      opacity:.6;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        0 0 60px rgba(83,231,255,.04);
    }

    #wrap{
      min-height:100vh;
      width:100%;
      padding:var(--shellPad);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      overscroll-behavior:none;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      margin-bottom:8px;
      min-height:46px;
      flex:0 0 auto;
    }

    .brand-block{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      min-width:0;
      width:100%;
    }

    .pill, #build, #status{ display:none !important; }

    h1{
      margin:0;
      font-size:clamp(2.0rem,4vw,4.4rem);
      line-height:.95;
      font-weight:1000;
      letter-spacing:-.04em;
      color:var(--gold);
      text-shadow:
        0 0 12px rgba(244,210,108,.18),
        0 0 26px rgba(244,210,108,.10),
        0 8px 20px rgba(0,0,0,.22);
      white-space:nowrap;
    }

    #gameBadge{
      font-size:clamp(1.4rem,2.6vw,2.4rem);
      line-height:1;
      font-weight:1000;
      color:var(--gold);
      text-shadow:0 0 14px rgba(244,210,108,.18);
      white-space:nowrap;
      margin-left:auto;
    }

    #content{
      flex:1;
      min-height:0;
      overflow:hidden;
      overscroll-behavior:none;
    }

    #diag{
      display:none !important;
    }

    .receiver-shell{
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .home-shell{
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .home-center{
      width:min(1400px,100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:12px;
    }

    .home-logo{
      width:min(320px, 28vw);
      max-width:320px;
      height:96px;
      display:block;
      object-fit:contain;
      filter:
        drop-shadow(0 0 16px rgba(255,214,90,.10))
        drop-shadow(0 0 28px rgba(83,231,255,.08));
    }

    .home-logo-fallback{
      display:none;
      font-size:clamp(52px, 6vw, 90px);
      line-height:.95;
      font-weight:1000;
      color:#f6e6b3;
      text-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .home-tagline{
      margin-top:0;
      font-size:clamp(20px, 2.2vw, 32px);
      font-weight:900;
      line-height:1.16;
      color:#f7f2df;
      text-shadow:0 8px 24px rgba(0,0,0,.28);
    }

    .receiver-layout{
      display:grid;
      grid-template-columns:minmax(220px, 0.9fr) minmax(0,2.2fr);
      gap:12px;
      height:100%;
      min-height:0;
      align-items:stretch;
    }

    .main-column{
      min-width:0;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:14px;
      overflow:hidden;
      overscroll-behavior:none;
    }

    .panel{
      border:1px solid var(--panelBorder);
      box-shadow:0 0 0 1px rgba(244,210,108,.10), var(--goldGlow), inset 0 1px 0 rgba(255,255,255,.03);
      border-radius:24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(83,231,255,.06), transparent 32%),
        radial-gradient(circle at 84% 80%, rgba(255,79,216,.05), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
      box-shadow:
        0 18px 42px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(8px);
      overflow:hidden;
      overscroll-behavior:none;
    }

    .order-panel{
      padding:10px;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .panel-title{
      font-size:clamp(15px,1.1vw,18px);
      font-weight:1000;
      margin-bottom:8px;
      color:var(--gold);
      text-shadow:0 0 10px rgba(244,210,108,.10);
      flex:0 0 auto;
    }

    .panel-title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .panel-subtitle{
      font-size:11px;
      opacity:.72;
      font-weight:700;
    }

    .mini-player-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:0;
      overflow:hidden;
      overscroll-behavior:none;
    }

    .mini-player-card{
      display:grid;
      grid-template-columns:42px minmax(0,1fr) auto;
      gap:8px;
      align-items:center;
      border-radius:18px;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
      min-width:0;
    }

    .mini-player-card.is-active{
      border-color:rgba(83,231,255,.28);
      background:linear-gradient(180deg, rgba(83,231,255,.10), rgba(255,255,255,.03));
      box-shadow:
        0 0 16px rgba(83,231,255,.08),
        inset 0 1px 0 rgba(255,255,255,.03);
    }

    .mini-player-name{
      font-size:clamp(13px,1.15vw,15px);
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      overscroll-behavior:none;
      text-overflow:ellipsis;
    }

    .mini-player-score{
      font-size:clamp(18px,1.7vw,24px);
      font-weight:1000;
      line-height:1;
      letter-spacing:-.04em;
      white-space:nowrap;
    }

    .avatar-frame{
      border-radius:999px;
      overflow:hidden;
      overscroll-behavior:none;
      border:2px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      box-shadow:
        0 10px 24px rgba(0,0,0,.30),
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 0 4px rgba(255,255,255,.02);
      flex:0 0 auto;
    }

    .avatar-fallback{
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:1000;
      background:
        radial-gradient(circle at 30% 25%, rgba(83,231,255,.22), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(16,24,36,.96), rgba(8,10,18,.96));
    }

    .active-panel{
      padding:12px;
      flex:0 0 auto;
    }

    .active-top{
      display:grid;
      grid-template-columns:minmax(140px, 180px) minmax(0,1fr);
      gap:12px;
      align-items:center;
    }

    .active-left{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-width:0;
    }

    .active-avatar-wrap{
      position:relative;
    }

    .active-badge{
      display:none !important;
    }

    .active-name{
      margin-top:8px;
      font-size:clamp(22px,2.1vw,30px);
      font-weight:1000;
      line-height:1.06;
      max-width:100%;
      word-break:break-word;
      text-shadow:0 8px 24px rgba(0,0,0,.24);
    }

    .score-card{
      min-height:146px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 18% 20%, rgba(83,231,255,.14), transparent 30%),
        radial-gradient(circle at 84% 80%, rgba(255,79,216,.10), transparent 30%),
        linear-gradient(180deg, rgba(20,28,42,.98), rgba(10,14,22,.98));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 0 24px rgba(83,231,255,.08);
      padding:12px 16px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
      overscroll-behavior:none;
    }

    .score-label{
      font-size:clamp(15px,1.1vw,18px);
      font-weight:900;
      opacity:.88;
      margin-bottom:10px;
      color:var(--gold);
      text-shadow:0 0 12px rgba(83,231,255,.14);
    }

    .score-value{
      font-size:clamp(84px, 10vw, 150px);
      line-height:.88;
      font-weight:1000;
      letter-spacing:-.06em;
      color:#fff6c9;
      text-shadow:
        0 10px 28px rgba(0,0,0,.30),
        0 0 16px rgba(244,210,108,.16),
        0 0 8px rgba(83,231,255,.10);
      white-space:nowrap;
      overflow:hidden;
      overscroll-behavior:none;
      max-width:100%;
    }

    .stats-grid{
      margin-top:0;
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:8px;
    }

    .stat-cell{
      min-height:58px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.035);
      padding:8px 10px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
      overflow:hidden;
      overscroll-behavior:none;
    }

    .stat-label{
      opacity:.74;
      font-size:11px;
      margin-bottom:6px;
      font-weight:800;
      white-space:nowrap;
    }

    .stat-value{
      font-size:clamp(16px,1.35vw,22px);
      font-weight:1000;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      overscroll-behavior:none;
      text-overflow:ellipsis;
    }

    .graph-panel{
      margin-top:0;
      padding:10px;
      flex:1 1 auto;
      min-height:0;
    }

    .graph-svg{
      width:100%;
      height:96px;
      display:block;
      border-radius:14px;
      background:radial-gradient(circle at top, rgba(255,255,255,.04), rgba(255,255,255,.01));
    }

    .graph-legend{
      display:none;
      gap:10px 16px;
      margin-top:0;
    }

    .graph-legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .graph-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    .graph-legend-name{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      overscroll-behavior:none;
      text-overflow:ellipsis;
      font-size:14px;
    }

    .graph-legend-score{
      opacity:.78;
      font-size:14px;
    }
  
    .active-panel{display:flex;flex-direction:column;gap:10px;min-height:0;}
    .graph-panel{flex:0 0 auto;margin-top:0;min-height:0;}
    .compact-four{grid-template-columns:repeat(4,minmax(0,1fr));}
    .mini-player-card{border-color:color-mix(in oklab, var(--player-color) 58%, rgba(255,255,255,.10));}
    .mini-player-card.is-active{background:linear-gradient(180deg, color-mix(in oklab, var(--player-color) 14%, rgba(255,255,255,.04)), rgba(255,255,255,.03)); box-shadow:0 0 18px color-mix(in oklab, var(--player-color) 30%, transparent), inset 0 1px 0 rgba(255,255,255,.03);}
    .mini-player-info{min-width:0;}
    .main-column,.order-panel,.receiver-layout,.receiver-shell{min-height:0;}
    .receiver-shell{padding-bottom:0;}
    .active-top{flex:0 0 auto;}
    .score-card,.graph-panel,.stat-cell,.mini-player-card,.order-panel,.active-panel{max-width:100%;}
    @media (max-width: 1280px){
      .receiver-layout{grid-template-columns:minmax(205px,.9fr) minmax(0,2.3fr);gap:12px}
      .compact-four{grid-template-columns:repeat(3,minmax(0,1fr));}
      .graph-svg{height:88px;}
      .score-value{font-size:clamp(70px,8vw,120px)}
    }

  </style>
</head>
<body>
  <div id="wrap">
    <div class="topbar">
      <div class="brand-block">
        <h1>Multisports Scoring</h1>
        <div id="gameBadge"></div>
        <div class="pill">● Receiver Chromecast CAF</div>
        <div id="status">Chargement du receiver…</div>
        <div id="build">Build: CAF-VISUAL-X01-ADAPT-2026-03-26-2</div>
      </div>
    </div>

    <div id="content"></div>
    <div id="diag">Initialisation…</div>
  </div>

  <script src="receiver.js?v=CAF-VISUAL-X01-ADAPT-2026-03-26-2"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Multisports Receiver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    body { margin:0; background: radial-gradient(circle at top, #18202d 0%, #090b10 58%, #050608 100%); color:white; font-family:Inter,system-ui,sans-serif; min-height:100vh; }
    #wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; }
    .card { width:min(1180px,100%); border:1px solid rgba(255,255,255,.10); border-radius:28px; background:rgba(0,0,0,.24); box-shadow:0 24px 60px rgba(0,0,0,.35); padding:32px; }
    h1 { font-size:clamp(2.4rem,5vw,5rem); margin:0 0 10px; font-weight:1000; }
    #status { font-size:clamp(1rem,2vw,1.5rem); opacity:.95; margin-bottom:14px; }
    #diag { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:14px; line-height:1.45; white-space:pre-wrap; word-break:break-word; margin-top:20px; border:1px solid rgba(255,255,255,.08); border-radius:16px; background:rgba(255,255,255,.03); padding:14px; min-height:140px; }
    .pill { display:inline-flex; align-items:center; justify-content:center; border-radius:999px; border:1px solid rgba(255,255,255,.10); padding:10px 16px; margin-bottom:14px; color:#fbbf24; background:rgba(255,255,255,.04); font-weight:900; }
    #build { opacity:.72; font-size:13px; margin-top:8px; }
    .board { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-top:22px; }
    .player { border:1px solid rgba(255,255,255,.08); border-radius:22px; padding:22px; background:linear-gradient(180deg, rgba(20,24,31,.96), rgba(10,12,17,.96)); box-shadow:0 20px 50px rgba(0,0,0,.28); }
    .player.active { outline:3px solid rgba(16,185,129,.65); }
    .name { font-size:2rem; font-weight:900; margin-bottom:10px; }
    .score { font-size:clamp(3rem,8vw,6rem); font-weight:1000; line-height:1; }
  </style>
</head>
<body>
  <div id="wrap">
    <div class="card">
      <div class="pill">● Receiver Chromecast CAF</div>
      <h1>Multisports Scoring</h1>
      <div id="status">Chargement du receiver…</div>
      <div id="build">Build: CAF-DIAG-2026-03-19-1515</div>
      <div id="content"></div>
      <div id="diag">Initialisation…</div>
    </div>
  </div>
  <script src="receiver.js?v=CAF-DIAG-2026-03-19-1515"></script>
</body>
</html>

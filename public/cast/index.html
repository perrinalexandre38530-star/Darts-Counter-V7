<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Multisports Receiver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    :root{
      --bg1:#10274a;
      --bg2:#0b1f3e;
      --bg3:#091122;
      --panel:rgba(255,255,255,.055);
      --panelBorder:rgba(255,255,255,.11);
      --text:#f7f6f3;
      --muted:rgba(255,255,255,.72);
      --accent:#53e7ff;
      --accent2:#7cc3ff;
      --gold:#f4d26c;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(1200px 700px at 50% 0%, #1a5fd1 0%, rgba(26,95,209,.30) 34%, rgba(26,95,209,0) 70%),
        radial-gradient(1000px 520px at 50% 100%, rgba(33,116,255,.13), rgba(33,116,255,0) 62%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 42%, var(--bg3) 100%);
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:26px;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.22);
      pointer-events:none;
      opacity:.75;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 0 120px rgba(83,231,255,.08);
    }

    #wrap{
      min-height:100vh;
      width:100%;
      padding:38px 42px;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:20px;
      margin-bottom:22px;
    }

    .brand-block{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      align-self:flex-start;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      padding:10px 18px;
      color:var(--gold);
      background:rgba(255,255,255,.05);
      font-weight:900;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    h1{
      margin:0;
      font-size:clamp(2.5rem,4.6vw,5.4rem);
      line-height:.95;
      font-weight:1000;
      letter-spacing:-.04em;
      text-shadow:0 10px 24px rgba(0,0,0,.22);
    }

    #status{
      font-size:clamp(1rem,1.8vw,1.5rem);
      opacity:.96;
      min-height:1.4em;
    }

    #build{
      opacity:.82;
      font-size:13px;
      font-weight:700;
    }

    #content{
      flex:1;
      min-height:0;
    }

    #diag{
      display:none !important;
    }

    .receiver-shell{
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .home-shell{
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .home-center{
      width:min(1100px,100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .home-logo{
      width:min(360px, 40vw);
      max-width:360px;
      height:auto;
      display:block;
      filter:
        drop-shadow(0 0 18px rgba(255,214,90,.12))
        drop-shadow(0 0 40px rgba(83,231,255,.10));
    }

    .home-logo-fallback{
      display:none;
      font-size:clamp(56px, 7vw, 100px);
      line-height:.95;
      font-weight:1000;
      color:#f6e6b3;
      text-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .home-tagline{
      margin-top:26px;
      font-size:clamp(22px, 2.7vw, 42px);
      font-weight:900;
      line-height:1.16;
      color:#f7f2df;
      text-shadow:0 8px 24px rgba(0,0,0,.28);
    }

    .cast-game-title{
      font-size:clamp(28px,2.5vw,42px);
      font-weight:1000;
      margin-bottom:14px;
      text-shadow:0 8px 24px rgba(0,0,0,.24);
    }

    .receiver-layout{
      display:grid;
      grid-template-columns:320px minmax(0,1fr);
      gap:22px;
      min-height:0;
      align-items:start;
    }

    .main-column{
      min-width:0;
      min-height:0;
    }

    .panel{
      border:1px solid var(--panelBorder);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:
        0 22px 52px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
    }

    .order-panel{
      padding:18px;
    }

    .panel-title{
      font-size:30px;
      font-weight:1000;
      margin-bottom:14px;
      text-shadow:0 8px 24px rgba(0,0,0,.20);
    }

    .panel-title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:10px;
    }

    .panel-subtitle{
      font-size:14px;
      opacity:.75;
      font-weight:700;
    }

    .mini-player-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .mini-player-card{
      display:grid;
      grid-template-columns:60px minmax(0,1fr) auto;
      gap:12px;
      align-items:center;
      border-radius:22px;
      padding:12px 14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .mini-player-card.is-active{
      border-color:rgba(83,231,255,.34);
      background:linear-gradient(180deg, rgba(83,231,255,.12), rgba(255,255,255,.04));
      box-shadow:
        0 0 18px rgba(83,231,255,.11),
        inset 0 1px 0 rgba(255,255,255,.04);
    }

    .mini-player-name{
      font-size:20px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .mini-player-score{
      font-size:42px;
      font-weight:1000;
      line-height:1;
      letter-spacing:-.04em;
    }

    .avatar-frame{
      border-radius:999px;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      box-shadow:
        0 16px 34px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.06),
        0 0 0 6px rgba(255,255,255,.03);
      flex:0 0 auto;
    }

    .avatar-fallback{
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:1000;
      background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.16), rgba(255,255,255,.03));
    }

    .active-panel{
      padding:24px;
    }

    .active-top{
      display:grid;
      grid-template-columns:300px minmax(0,1fr);
      gap:24px;
      align-items:center;
    }

    .active-left{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .active-avatar-wrap{
      position:relative;
    }

    .active-badge{
      position:absolute;
      top:-8px;
      right:-10px;
      width:92px;
      height:92px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.04;
      font-size:16px;
      font-weight:1000;
      color:#f5fbff;
      background:linear-gradient(180deg, rgba(76,230,255,.94), rgba(37,164,191,.94));
      border:2px solid rgba(255,255,255,.24);
      box-shadow:
        0 10px 28px rgba(0,0,0,.30),
        0 0 22px rgba(76,230,255,.22);
      padding:10px;
    }

    .active-name{
      margin-top:16px;
      font-size:36px;
      font-weight:1000;
      line-height:1.06;
      max-width:100%;
      word-break:break-word;
      text-shadow:0 8px 24px rgba(0,0,0,.24);
    }

    .score-card{
      min-height:224px;
      border-radius:32px;
      border:1px solid rgba(255,255,255,.10);
      background:radial-gradient(circle at 30% 25%, rgba(255,255,255,.10), rgba(255,255,255,.025));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      padding:22px 26px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
    }

    .score-label{
      font-size:24px;
      font-weight:900;
      opacity:.84;
      margin-bottom:8px;
    }

    .score-value{
      font-size:clamp(150px, 15vw, 240px);
      line-height:.85;
      font-weight:1000;
      letter-spacing:-.06em;
      text-shadow:0 10px 28px rgba(0,0,0,.30);
    }

    .stats-grid{
      margin-top:22px;
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:14px;
    }

    .stat-cell{
      min-height:86px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      padding:12px 14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .stat-label{
      opacity:.76;
      font-size:14px;
      margin-bottom:8px;
      font-weight:800;
    }

    .stat-value{
      font-size:28px;
      font-weight:1000;
      line-height:1.05;
    }

    .graph-panel{
      margin-top:18px;
      padding:18px;
    }

    .graph-svg{
      width:100%;
      height:auto;
      display:block;
      border-radius:18px;
      background:radial-gradient(circle at top, rgba(255,255,255,.05), rgba(255,255,255,.01));
    }

    .graph-legend{
      display:flex;
      flex-wrap:wrap;
      gap:14px 20px;
      margin-top:14px;
    }

    .graph-legend-item{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .graph-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    .graph-legend-name{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .graph-legend-score{
      opacity:.78;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div class="topbar">
      <div class="brand-block">
        <div class="pill">● Receiver Chromecast CAF</div>
        <h1>Multisports Scoring</h1>
        <div id="status">Chargement du receiver…</div>
        <div id="build">Build: CAF-VISUAL-X01-2026-03-19-4</div>
      </div>
    </div>

    <div id="content"></div>
    <div id="diag">Initialisation…</div>
  </div>

  <script src="receiver.js?v=CAF-VISUAL-X01-2026-03-19-4"></script>
</body>
</html>

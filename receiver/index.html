<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multisports Cast Receiver</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at top, #18202d 0%, #090b10 58%, #050608 100%); color: #f8fafc; font-family: Inter, system-ui, sans-serif; }
      body { display: flex; min-height: 100vh; }
      #app { width: 100%; padding: 28px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; }
      .title { font-size: 3rem; font-weight: 900; letter-spacing: .03em; }
      .meta { display:flex; gap:10px; flex-wrap:wrap; }
      .pill { border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); border-radius:999px; padding:10px 14px; font-weight:800; font-size:1rem; }
      .board { flex:1; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:18px; }
      .player { border:1px solid rgba(255,255,255,.08); background:linear-gradient(180deg, rgba(20,24,31,.96), rgba(10,12,17,.96)); border-radius:28px; padding:28px; box-shadow:0 22px 60px rgba(0,0,0,.35); display:flex; flex-direction:column; justify-content:space-between; min-height: 360px; }
      .player.active { outline: 3px solid rgba(16,185,129,.65); }
      .name { font-size:2.3rem; font-weight:900; }
      .score { font-size:min(10rem, 18vw); line-height:1; font-weight:1000; letter-spacing:-.04em; }
      .sub { color:#cbd5e1; font-size:1.1rem; }
      .empty { display:grid; place-items:center; flex:1; border:1px dashed rgba(255,255,255,.16); border-radius:28px; color:#cbd5e1; font-size:2rem; font-weight:800; }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="topbar">
        <div>
          <div id="title" class="title">Multisports Scoring</div>
          <div id="status" class="sub">En attente de données…</div>
        </div>
        <div id="meta" class="meta"></div>
      </div>
      <div id="board" class="board">
        <div class="empty">En attente d’un score envoyé depuis le téléphone…</div>
      </div>
    </div>
    <script src="./receiver.js"></script>
  </body>
</html>
